<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boulangerie Morin | Dashboard Commandes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --black: #0a0a0a;
            --dark: #1a1a1a;
            --dark-light: #222;
            --gray-dark: #3a3a3a;
            --gray: #888;
            --gray-light: #bbb;
            --white: #f5f5f0;
            --gold: #c9a96e;
            --gold-light: #d4b97a;
            --green: #4caf50;
            --blue: #5b9bd5;
            --orange: #e89a3c;
            --red: #d94444;
            --font-heading: 'Playfair Display', serif;
            --font-body: 'Lato', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-body);
            background: var(--black);
            color: var(--gray-light);
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: var(--dark);
            border-bottom: 1px solid rgba(201,169,110,0.15);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .header-logo {
            font-family: var(--font-heading);
            font-size: 1.3rem;
            color: var(--gold);
            font-weight: 700;
        }

        .header-badge {
            background: rgba(201,169,110,0.1);
            border: 1px solid rgba(201,169,110,0.3);
            color: var(--gold);
            padding: 0.3rem 0.8rem;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .site-link {
            color: var(--gray);
            font-size: 0.8rem;
            text-decoration: none;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: color 0.3s;
        }

        .site-link:hover { color: var(--gold); }

        .refresh-btn {
            background: none;
            border: 1px solid var(--gray-dark);
            color: var(--gray);
            padding: 0.5rem 1rem;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            font-family: var(--font-body);
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .refresh-btn:hover {
            border-color: var(--gold);
            color: var(--gold);
        }

        .refresh-btn.loading svg {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Main */
        .main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--dark);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 1.5rem;
            transition: border-color 0.3s;
        }

        .stat-card:hover {
            border-color: rgba(201,169,110,0.2);
        }

        .stat-card .label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--gray);
            margin-bottom: 0.5rem;
        }

        .stat-card .value {
            font-family: var(--font-heading);
            font-size: 2rem;
            color: var(--gold);
            font-weight: 700;
        }

        .stat-card .value.new { color: var(--orange); }
        .stat-card .value.progress { color: var(--blue); }
        .stat-card .value.ready { color: var(--green); }

        /* Filters */
        .filters {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .filter-group label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--gray);
        }

        .filter-group select,
        .filter-group input {
            padding: 0.5rem 0.8rem;
            background: var(--dark);
            border: 1px solid var(--gray-dark);
            color: var(--white);
            font-family: var(--font-body);
            font-size: 0.85rem;
        }

        .filter-group select:focus,
        .filter-group input:focus {
            outline: none;
            border-color: var(--gold);
        }

        /* Orders Table */
        .orders-section h2 {
            font-family: var(--font-heading);
            font-size: 1.4rem;
            color: var(--white);
            margin-bottom: 1.5rem;
        }

        .orders-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--dark);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .orders-table th {
            padding: 1rem;
            text-align: left;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--gray);
            border-bottom: 1px solid rgba(201,169,110,0.15);
            background: rgba(201,169,110,0.03);
        }

        .orders-table td {
            padding: 1rem;
            font-size: 0.9rem;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            vertical-align: top;
        }

        .orders-table tr:hover td {
            background: rgba(201,169,110,0.02);
        }

        .order-id {
            font-family: var(--font-heading);
            color: var(--gold);
            font-weight: 700;
        }

        .customer-name {
            color: var(--white);
            font-weight: 700;
        }

        .customer-contact {
            font-size: 0.8rem;
            color: var(--gray);
            margin-top: 0.2rem;
        }

        .order-items-list {
            list-style: none;
            font-size: 0.85rem;
        }

        .order-items-list li {
            padding: 0.15rem 0;
            color: var(--gray-light);
        }

        .order-items-list .qty {
            color: var(--gold);
            font-weight: 700;
        }

        .order-total {
            font-family: var(--font-heading);
            font-size: 1.1rem;
            color: var(--gold);
            font-weight: 700;
        }

        .pickup-details {
            font-size: 0.85rem;
        }

        .pickup-details .date {
            color: var(--white);
            font-weight: 700;
        }

        .pickup-details .time {
            color: var(--gold);
        }

        .order-notes {
            font-size: 0.8rem;
            color: var(--gray);
            font-style: italic;
            max-width: 150px;
        }

        /* Status */
        .status-badge {
            display: inline-block;
            padding: 0.3rem 0.7rem;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
            border: 1px solid;
        }

        .status-nouvelle {
            color: var(--orange);
            border-color: var(--orange);
            background: rgba(232,154,60,0.1);
        }

        .status-en_preparation {
            color: var(--blue);
            border-color: var(--blue);
            background: rgba(91,155,213,0.1);
        }

        .status-prete {
            color: var(--green);
            border-color: var(--green);
            background: rgba(76,175,80,0.1);
        }

        .status-recuperee {
            color: var(--gray);
            border-color: var(--gray);
            background: rgba(136,136,136,0.1);
        }

        .status-annulee {
            color: var(--red);
            border-color: var(--red);
            background: rgba(217,68,68,0.1);
        }

        /* Actions */
        .actions {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .action-btn {
            padding: 0.4rem 0.8rem;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid;
            background: transparent;
            cursor: pointer;
            font-family: var(--font-body);
            transition: all 0.3s;
            white-space: nowrap;
        }

        .action-btn:hover {
            transform: translateY(-1px);
        }

        .action-btn.prepare {
            color: var(--blue);
            border-color: var(--blue);
        }
        .action-btn.prepare:hover {
            background: var(--blue);
            color: var(--black);
        }

        .action-btn.ready {
            color: var(--green);
            border-color: var(--green);
        }
        .action-btn.ready:hover {
            background: var(--green);
            color: var(--black);
        }

        .action-btn.done {
            color: var(--gray);
            border-color: var(--gray);
        }
        .action-btn.done:hover {
            background: var(--gray);
            color: var(--black);
        }

        .action-btn.cancel {
            color: var(--red);
            border-color: rgba(217,68,68,0.4);
        }
        .action-btn.cancel:hover {
            background: var(--red);
            color: var(--white);
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--gray-dark);
        }

        .empty-state svg {
            margin-bottom: 1rem;
            opacity: 0.3;
        }

        .empty-state p {
            font-size: 1rem;
        }

        /* Notification dot */
        .notification-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--orange);
            border-radius: 50%;
            margin-left: 0.5rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .created-at {
            font-size: 0.75rem;
            color: var(--gray-dark);
            margin-top: 0.3rem;
        }

        /* Sound toggle */
        .sound-toggle {
            background: none;
            border: 1px solid var(--gray-dark);
            color: var(--gray);
            padding: 0.5rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
        }

        .sound-toggle:hover {
            border-color: var(--gold);
            color: var(--gold);
        }

        .sound-toggle.active {
            border-color: var(--green);
            color: var(--green);
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .orders-table { font-size: 0.85rem; }
            .main { padding: 1rem; }
        }

        @media (max-width: 768px) {
            .header { flex-direction: column; gap: 1rem; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .orders-table-wrapper { overflow-x: auto; }
            .orders-table { min-width: 900px; }
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--dark); }
        ::-webkit-scrollbar-thumb { background: var(--gray-dark); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--gold); }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-left">
            <span class="header-logo">Boulangerie Morin</span>
            <span class="header-badge">Dashboard</span>
        </div>
        <div class="header-right">
            <a href="/" class="site-link">&larr; Voir le site</a>
            <button class="sound-toggle" id="soundToggle" title="Activer les notifications sonores">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                    <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
                </svg>
            </button>
            <button class="refresh-btn" id="refreshBtn" onclick="loadData()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
                </svg>
                Actualiser
            </button>
        </div>
    </header>

    <main class="main">
        <!-- Stats -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="label">Commandes aujourd'hui</div>
                <div class="value" id="statToday">-</div>
            </div>
            <div class="stat-card">
                <div class="label">Nouvelles commandes</div>
                <div class="value new" id="statNew">-</div>
            </div>
            <div class="stat-card">
                <div class="label">En pr&eacute;paration</div>
                <div class="value progress" id="statProgress">-</div>
            </div>
            <div class="stat-card">
                <div class="label">Pr&ecirc;tes &agrave; retirer</div>
                <div class="value ready" id="statReady">-</div>
            </div>
            <div class="stat-card">
                <div class="label">Chiffre du jour</div>
                <div class="value" id="statRevenue">-</div>
            </div>
        </div>

        <!-- Filters -->
        <div class="filters">
            <div class="filter-group">
                <label>Statut</label>
                <select id="filterStatus" onchange="loadOrders()">
                    <option value="all">Tous</option>
                    <option value="nouvelle">Nouvelles</option>
                    <option value="en_preparation">En pr&eacute;paration</option>
                    <option value="prete">Pr&ecirc;tes</option>
                    <option value="recuperee">R&eacute;cup&eacute;r&eacute;es</option>
                    <option value="annulee">Annul&eacute;es</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Date retrait</label>
                <input type="date" id="filterDate" onchange="loadOrders()">
            </div>
        </div>

        <!-- Orders -->
        <section class="orders-section">
            <h2>Commandes <span class="notification-dot" id="notifDot" style="display:none;"></span></h2>
            <div class="orders-table-wrapper">
                <table class="orders-table">
                    <thead>
                        <tr>
                            <th>N&deg;</th>
                            <th>Client</th>
                            <th>Articles</th>
                            <th>Total</th>
                            <th>Retrait</th>
                            <th>Notes</th>
                            <th>Statut</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="ordersBody">
                    </tbody>
                </table>
            </div>
            <div class="empty-state" id="emptyState" style="display:none;">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                </svg>
                <p>Aucune commande pour le moment</p>
            </div>
        </section>
    </main>

    <script>
        const API = '';
        let soundEnabled = false;
        let lastOrderCount = 0;

        // ===== Load Data =====
        async function loadData() {
            const btn = document.getElementById('refreshBtn');
            btn.classList.add('loading');
            await Promise.all([loadStats(), loadOrders()]);
            btn.classList.remove('loading');
        }

        async function loadStats() {
            try {
                const res = await fetch(`${API}/api/stats`);
                const stats = await res.json();

                document.getElementById('statToday').textContent = stats.todayOrders;
                document.getElementById('statNew').textContent = stats.newOrders;
                document.getElementById('statProgress').textContent = stats.inProgress;
                document.getElementById('statReady').textContent = stats.ready;
                document.getElementById('statRevenue').textContent = stats.todayRevenue.toFixed(2).replace('.', ',') + ' \u20AC';

                // Notification dot
                const dot = document.getElementById('notifDot');
                dot.style.display = stats.newOrders > 0 ? 'inline-block' : 'none';

                // Sound notification
                if (soundEnabled && stats.newOrders > lastOrderCount && lastOrderCount > 0) {
                    playNotification();
                }
                lastOrderCount = stats.newOrders;
            } catch (e) {
                console.error('Erreur chargement stats:', e);
            }
        }

        async function loadOrders() {
            try {
                const status = document.getElementById('filterStatus').value;
                const date = document.getElementById('filterDate').value;

                let url = `${API}/api/orders?`;
                if (status !== 'all') url += `status=${status}&`;
                if (date) url += `date=${date}&`;

                const res = await fetch(url);
                const orders = await res.json();

                const tbody = document.getElementById('ordersBody');
                const empty = document.getElementById('emptyState');

                if (orders.length === 0) {
                    tbody.innerHTML = '';
                    empty.style.display = 'block';
                    return;
                }

                empty.style.display = 'none';

                tbody.innerHTML = orders.map(order => {
                    const date = new Date(order.pickup_date + 'T00:00:00');
                    const formattedDate = date.toLocaleDateString('fr-FR', {
                        weekday: 'short', day: 'numeric', month: 'short'
                    });

                    const createdAt = new Date(order.created_at);
                    const createdStr = createdAt.toLocaleString('fr-FR', {
                        day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit'
                    });

                    return `
                        <tr>
                            <td>
                                <span class="order-id">#${order.id}</span>
                                <div class="created-at">${createdStr}</div>
                            </td>
                            <td>
                                <div class="customer-name">${escapeHtml(order.first_name)} ${escapeHtml(order.last_name)}</div>
                                <div class="customer-contact">${escapeHtml(order.phone)}</div>
                                <div class="customer-contact">${escapeHtml(order.email)}</div>
                            </td>
                            <td>
                                <ul class="order-items-list">
                                    ${order.items.map(item => `
                                        <li><span class="qty">${item.qty}x</span> ${escapeHtml(item.name)}</li>
                                    `).join('')}
                                </ul>
                            </td>
                            <td><span class="order-total">${order.total.toFixed(2).replace('.', ',')} \u20AC</span></td>
                            <td>
                                <div class="pickup-details">
                                    <div class="date">${formattedDate}</div>
                                    <div class="time">${order.pickup_time}</div>
                                </div>
                            </td>
                            <td><div class="order-notes">${order.notes ? escapeHtml(order.notes) : '-'}</div></td>
                            <td><span class="status-badge status-${order.status}">${formatStatus(order.status)}</span></td>
                            <td>
                                <div class="actions">
                                    ${getActionButtons(order)}
                                </div>
                            </td>
                        </tr>
                    `;
                }).join('');
            } catch (e) {
                console.error('Erreur chargement commandes:', e);
            }
        }

        function formatStatus(status) {
            const labels = {
                'nouvelle': 'Nouvelle',
                'en_preparation': 'En pr\u00e9p.',
                'prete': 'Pr\u00eate',
                'recuperee': 'R\u00e9cup\u00e9r\u00e9e',
                'annulee': 'Annul\u00e9e'
            };
            return labels[status] || status;
        }

        function getActionButtons(order) {
            switch (order.status) {
                case 'nouvelle':
                    return `
                        <button class="action-btn prepare" onclick="updateStatus(${order.id}, 'en_preparation')">Pr\u00e9parer</button>
                        <button class="action-btn cancel" onclick="updateStatus(${order.id}, 'annulee')">Annuler</button>
                    `;
                case 'en_preparation':
                    return `
                        <button class="action-btn ready" onclick="updateStatus(${order.id}, 'prete')">Pr\u00eate !</button>
                        <button class="action-btn cancel" onclick="updateStatus(${order.id}, 'annulee')">Annuler</button>
                    `;
                case 'prete':
                    return `
                        <button class="action-btn done" onclick="updateStatus(${order.id}, 'recuperee')">R\u00e9cup\u00e9r\u00e9e</button>
                    `;
                default:
                    return '<span style="color:var(--gray-dark); font-size:0.8rem;">-</span>';
            }
        }

        async function updateStatus(id, status) {
            try {
                await fetch(`${API}/api/orders/${id}/status`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status })
                });
                loadData();
            } catch (e) {
                console.error('Erreur mise \u00e0 jour:', e);
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ===== Sound =====
        function playNotification() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.frequency.value = 800;
                gain.gain.value = 0.3;
                osc.start();
                osc.stop(ctx.currentTime + 0.2);
                setTimeout(() => {
                    const osc2 = ctx.createOscillator();
                    const gain2 = ctx.createGain();
                    osc2.connect(gain2);
                    gain2.connect(ctx.destination);
                    osc2.frequency.value = 1000;
                    gain2.gain.value = 0.3;
                    osc2.start();
                    osc2.stop(ctx.currentTime + 0.3);
                }, 200);
            } catch (e) {}
        }

        document.getElementById('soundToggle').addEventListener('click', function() {
            soundEnabled = !soundEnabled;
            this.classList.toggle('active', soundEnabled);
            if (soundEnabled) playNotification();
        });

        // ===== Auto-refresh every 30 seconds =====
        setInterval(loadData, 30000);

        // ===== Initial Load =====
        loadData();
    </script>
</body>
</html>
